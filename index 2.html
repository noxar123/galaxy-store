<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>銀河商城</title>
    <style>
        /* 1. 銀河背景與星星閃爍特效 */
        body {
            margin: 0; height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif; color: white;
        }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* 2. 玻璃卡片 */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 80%; max-width: 400px; z-index: 1;
        }

        /* 3. 圖片特效 */
        img { 
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #5865F2; transition: 0.5s;
            box-shadow: 0 0 20px #5865F2;
        }
        img:hover { transform: rotate(360deg) scale(1.1); }

        /* 4. 按鈕水波紋特效 */
        .btn { 
            display: block; margin-top: 25px; padding: 15px;
            background-color: #5865F2; color: white;
            text-decoration: none; border-radius: 50px; font-weight: bold;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.95); background-color: #3e48b8; }
    </style>
</head>
<body>

    <script>
        for(let i=0; i<50; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random()*3 + 'px';
            s.style.height = s.style.width;
            s.style.left = Math.random()*100 + 'vw';
            s.style.top = Math.random()*100 + 'vh';
            s.style.animationDelay = Math.random()*2 + 's';
            document.body.appendChild(s);
        }
    </script>

    <div class="card">
        <img src="logo.PNG" alt="Logo">
        <h1>銀河商城</h1>
        <p>這裡是最優質的代儲商城，歡迎加入我們的社群，一起享受樂趣！</p>
        <a href="https://discord.gg/yAbKFryqmt" class="btn">加入我們的 Discord</a>
    </div>

</body>
</html>
